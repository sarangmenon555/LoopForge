name: Test and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false

      - name: Install dependencies (with test extras)
        run: uv sync --extra test

      - name: Start agent in background
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          uv run src/server.py --host 127.0.0.1 --port 9009 > /tmp/agent.log 2>&1 &
          echo $! > /tmp/agent.pid
          echo "Agent PID: $(cat /tmp/agent.pid)"

      - name: Wait for agent to be ready
        run: |
          echo "Polling http://127.0.0.1:9009/.well-known/agent-card.json ..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:9009/.well-known/agent-card.json > /dev/null 2>&1; then
              echo "✅ Agent is up after ${i}s"
              exit 0
            fi
            echo "  [${i}/60] not ready yet..."
            sleep 1
          done
          echo "❌ Agent did not start within 60s. Server log:"
          cat /tmp/agent.log
          exit 1

      - name: Run A2A conformance tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: uv run pytest --agent-url http://127.0.0.1:9009 -v

      - name: Print server log on failure
        if: failure()
        run: |
          echo "=== Agent server log ==="
          cat /tmp/agent.log || echo "(no log file)"

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for main agent
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push main agent Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract Docker metadata for proxy
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-proxy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push proxy Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.proxy
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}